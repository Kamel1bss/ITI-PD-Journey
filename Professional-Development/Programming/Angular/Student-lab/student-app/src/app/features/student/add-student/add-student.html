<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow border-0">
        <div class="card-header bg-dark text-white py-3">
          <h4 class="mb-0">Add New Student</h4>
        </div>
        <div class="card-body p-4">
          
          <form #studentForm="ngForm" (ngSubmit)="saveStudent()">
            
            <!-- Student ID -->
            <div class="mb-3">
              <label class="form-label fw-bold">Student ID</label>
              <input type="number" name="stId" class="form-control" 
                     [(ngModel)]="newStudent.stId" required #idInput="ngModel"
                     placeholder="Enter ID">
            </div>

            <!-- Name Row -->
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">First Name</label>
                <input type="text" name="stFname" class="form-control" 
                       [(ngModel)]="newStudent.stFname" placeholder="John" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Last Name</label>
                <input type="text" name="stLname" class="form-control" 
                       [(ngModel)]="newStudent.stLname" placeholder="Doe" required>
              </div>
            </div>

            <!-- Age -->
            <div class="mb-3">
              <label class="form-label fw-bold">Age</label>
              <input type="number" name="stAge" class="form-control" 
                     [(ngModel)]="newStudent.stAge" required min="1">
            </div>

            <!-- Address -->
            <div class="mb-4">
              <label class="form-label fw-bold">Address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                <input type="text" name="stAddress" class="form-control" 
                       [(ngModel)]="newStudent.stAddress" placeholder="123 Main St, City" required>
              </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success flex-grow-1" 
                      [disabled]="!studentForm.valid">
                <i class="bi bi-person-plus-fill"></i> Save Student
              </button>
              <button type="button" class="btn btn-outline-secondary" (click)="onCancel()">
                Cancel
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
