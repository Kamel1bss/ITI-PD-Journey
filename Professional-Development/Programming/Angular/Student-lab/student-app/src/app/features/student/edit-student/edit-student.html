<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow border-0">
        <div class="card-header bg-dark text-white py-3">
          <h4 class="mb-0">
            <i class="bi bi-pencil-square"></i> Edit Student: {{ student.stFname }}
          </h4>
        </div>
        <div class="card-body p-4">
          
          <form #editForm="ngForm" (ngSubmit)="save()">
            
            <!-- Student ID (Readonly) -->
            <div class="mb-3">
              <label class="form-label fw-bold">Student ID (Static)</label>
              <input type="number" name="stId" class="form-control bg-light" 
                     [(ngModel)]="student.stId" readonly>
            </div>

            <!-- First & Last Name -->
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">First Name</label>
                <input type="text" name="stFname" class="form-control" 
                       [(ngModel)]="student.stFname" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Last Name</label>
                <input type="text" name="stLname" class="form-control" 
                       [(ngModel)]="student.stLname" required>
              </div>
            </div>

            <div class="row">
              <!-- Age -->
              <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Age</label>
                <input type="number" name="stAge" class="form-control" 
                       [(ngModel)]="student.stAge" required>
              </div>
              
              <!-- Department -->
              <div class="col-md-8 mb-3">
                <label class="form-label fw-bold">Department</label>
                <input type="text" name="deptName" class="form-control" 
                       [(ngModel)]="student.deptName" required>
              </div>
            </div>

            <!-- Address -->
            <div class="mb-3">
              <label class="form-label fw-bold">Address</label>
              <input type="text" name="stAddress" class="form-control" 
                     [(ngModel)]="student.stAddress" required>
            </div>

            <!-- Supervisor -->
            <div class="mb-4">
              <label class="form-label fw-bold">Supervisor Name</label>
              <input type="text" name="supervisorName" class="form-control" 
                     [(ngModel)]="student.supervisorName">
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-warning flex-grow-1" [disabled]="!editForm.valid">
                Update Changes
              </button>
              <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
                Cancel
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
