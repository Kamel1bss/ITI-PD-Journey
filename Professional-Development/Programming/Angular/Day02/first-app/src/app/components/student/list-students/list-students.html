<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="text-secondary">Student Management</h2>
    <span class="badge bg-info text-dark">Total: {{ studentService.students.length }}</span>
  </div>

  <app-add-student></app-add-student>

  <div class="table-responsive shadow-sm rounded">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th style="width: 10%">ID</th>
          <th>Name</th>
          <th style="width: 15%">Age</th>
          <th style="width: 20%" class="text-center">Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (student of studentService.students; track student.id) {
          <tr [class.table-danger]="student.age > 30">
            <td class="fw-bold">#{{student.id}}</td>
            <td>{{student.name}}</td>
            <td>
              <span class="badge rounded-pill bg-secondary">{{student.age}}</span>
            </td>
            <td>
              <div class="d-flex justify-content-center gap-2">
                <button 
                    (click)="prepareEdit(student)" 
                    class="btn btn-outline-primary btn-sm">
                    Edit
                </button>
                <button 
                    (click)="deleteStudent(student.id)" 
                    class="btn btn-outline-danger btn-sm">
                    Delete
                </button>
              </div>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="4" class="text-center text-muted py-4">
              No students found. Add one above!
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
