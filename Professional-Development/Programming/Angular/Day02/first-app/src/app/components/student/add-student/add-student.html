<div class="card shadow-sm mb-4">
  <div class="card-header bg-primary text-white">
    <h5 class="mb-0">Add New Student</h5>
  </div>
  <div class="card-body">
    <form (ngSubmit)="addStudent()" class="row g-3 align-items-end">
      <div class="col-md-2">
        <label class="form-label small fw-bold">ID</label>
        <input [(ngModel)]="student.id" name="id" type="number" class="form-control" placeholder="0">
      </div>
      <div class="col-md-5">
        <label class="form-label small fw-bold">Full Name</label>
        <input [(ngModel)]="student.name" name="name" type="text" class="form-control" placeholder="Enter name">
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-bold">Age</label>
        <input [(ngModel)]="student.age" name="age" type="number" class="form-control" placeholder="Age">
      </div>
      <div class="col-md-2">
        <button type="submit" class="btn btn-success w-100">
          <i class="bi bi-plus-lg"></i> Add
        </button>
      </div>
    </form>
  </div>
</div>
