<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Students & Departments</title>

    <script src="jquery/jquery.js"></script>

    <style>
        table {
            width: 70%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>

    <script>
        $(function () {

            // ---------------- STUDENTS ----------------
            $.ajax({
                url: "https://localhost:7189/api/students/all",
                method: "GET",
                success: function (data) {

                    let rows = "";

                    data.forEach(s => {
                        rows += `
                                <tr>
                                    <td>${s.stId}</td>
                                    <td>${s.stFname} ${s.stLname}</td>
                                    <td>${s.stAddress}</td>
                                    <td>${s.stAge}</td>
                                    <td>${s.deptName ?? "-"}</td>
                                    <td>${s.supervisorName ?? "-"}</td>
                                </tr>
                            `;
                    });

                    $("#studentsTable tbody").html(rows);
                },
                error: function (err) {
                    console.log(err);
                }
            });

            // ---------------- DEPARTMENTS ----------------
            $.ajax({
                url: "https://localhost:7189/api/departments",
                method: "GET",
                success: function (data) {

                    let rows = "";

                    data.forEach(d => {
                        rows += `
                                <tr>
                                    <td>${d.deptId}</td>
                                    <td>${d.deptName}</td>
                                    <td>${d.deptDesc}</td>
                                    <td>${d.deptLocation}</td>
                                    <td>${d.studentsCount}</td>
                                </tr>
                            `;
                    });

                    $("#departmentsTable tbody").html(rows);
                },
                error: function (err) {
                    console.log(err);
                }
            });

        });
    </script>
</head>

<body>

    <h2>Students</h2>
    <table id="studentsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>Address</th>
                <th>Age</th>
                <th>Department</th>
                <th>Supervisor</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2>Departments</h2>
    <table id="departmentsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Location</th>
                <th>Students Count</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</body>
</html>
