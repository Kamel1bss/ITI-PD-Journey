<!DOCTYPE html>
<html>
<head>
<title>Draggable & Droppable</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<link rel="stylesheet"
href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to right,#e3f2fd,#ffffff);
    text-align:center;
    margin-top:40px;
}

h2{
    font-size:32px;
    margin-bottom:30px;
    color:#333;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:120px;
}

/* black hole */

#blackhole{
    width:320px;
    height:320px;
    border-radius:50%;
    object-fit:cover;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    border:6px solid #000;
    transition:0.3s;
}

#blackhole.ui-droppable-hover{
    transform:scale(1.05);
    box-shadow:0 0 60px rgba(0,0,0,0.9);
}

/* draggable image */

#dragImg{
    width:120px;
    cursor:grab;
    border-radius:10px;
    border:4px solid #ffd54f;
    padding:10px;
    background:white;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

#dragImg:hover{
    transform:scale(1.05);
}

.caption{
    margin-top:10px;
    font-weight:bold;
    color:#444;
}

</style>
</head>

<body>

<h2>Drag the Image into the Black Hole</h2>

<div class="container">

<div>
<img id="blackhole" src="imgs/3.jpg">
</div>

<div>
<img id="dragImg" src="imgs/2.jpg">
<div class="caption">Drag Me</div>
</div>

</div>

<script>

$(function(){

    $("#dragImg").draggable({
        revert:"invalid"
    });

    $("#blackhole").droppable({

        drop:function(event,ui){
            $("#dragImg").fadeOut(500);
        }

    });

});

</script>

</body>
</html>
